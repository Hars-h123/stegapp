{% extends "base.html" %} 
<div class="max-w-3xl mx-auto bg-white rounded-2xl shadowxl p-10"></div>
{% block content %}

<!-- Back Link -->
<div class="mb-6">
  <a
    href="/"
    class="text-sm font-medium opacity-70 hover:opacity-100 transition"
  >
    ← Back
  </a>
</div>

<h2 class="text-3xl font-bold mb-10 text-center">Decode Hidden Message</h2>

<form
  id="decode-form"
  method="POST"
  action="/decode_action"
  enctype="multipart/form-data"
  class="space-y-8"
>
  <!-- Upload Stego Image -->
  <div>
    <label class="block font-semibold mb-3"> Upload Stego Image </label>

    <div
      class="border-2 border-dashed border-indigo-400 rounded-xl p-6 text-center cursor-pointer hover:bg-indigo-50 transition"
      onclick="document.getElementById('decodeImage').click()"
    >
      <input
        type="file"
        id="decodeImage"
        name="image"
        accept="image/png, image/jpeg"
        class="hidden"
        onchange="showFileName(this)"
      />

      <p class="text-gray-600">Drag & Drop your image here</p>
      <p class="text-sm text-gray-400 mt-2">or click to browse files</p>

      <p id="file-name" class="mt-3 text-sm text-indigo-600 font-medium"></p>
    </div>
  </div>

  <!-- Password -->
  <div>
    <label class="block font-semibold mb-2">Enter Decryption Password</label>
    <input
      type="password"
      name="password"
      class="w-full border rounded-lg p-3"
      required
    />
  </div>

  <!-- Submit -->
  <div class="text-center">
    <button
      type="submit"
      id="decode-btn"
      class="px-6 py-3 rounded-lg font-semibold saas-btn transition"
    >
      Decode Message
    </button>
  </div>
</form>

<!-- Processing Overlay -->
<div
  id="processing-overlay"
  class="fixed inset-0 hidden items-center justify-center z-50 bg-white/70 backdrop-blur-sm"
>
  <div class="bg-white rounded-2xl shadow-2xl px-10 py-8 text-center w-[320px]">
    <div class="text-indigo-600 text-lg font-semibold mb-3">
      Decoding image...
    </div>

    <p class="text-gray-500 text-sm mb-4">
      Please wait. Do not refresh the page.
    </p>

    <div
      class="w-6 h-6 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto"
    ></div>
  </div>
</div>

<!-- Result Modal -->
<div
  id="result-modal"
  class="fixed inset-0 hidden items-center justify-center z-50 bg-white/70 backdrop-blur-sm"
>
  <div class="bg-white rounded-2xl shadow-2xl px-10 py-8 text-center w-[400px]">
    <h3 class="text-lg font-semibold text-indigo-600 mb-4">Decoded Message</h3>

    <div
      id="decoded-message"
      class="bg-gray-100 rounded-lg p-4 text-gray-800 break-words mb-6"
    ></div>

    <button
      onclick="closeResult()"
      class="px-5 py-2 rounded-lg bg-indigo-600 text-white"
    >
      Close
    </button>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("decode-form");
    const btn = document.getElementById("decode-btn");
    const modal = document.getElementById("result-modal");
    const messageBox = document.getElementById("decoded-message");
    const overlay = document.getElementById("processing-overlay");

    const dropArea = document.querySelector(".border-dashed");
    const fileInput = document.getElementById("decodeImage");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      // SHOW PROCESSING OVERLAY
      overlay.classList.remove("hidden");
      overlay.classList.add("flex");

      btn.disabled = true;
      btn.innerText = "Decoding...";

      try {
        const response = await fetch(form.action, {
          method: "POST",
          body: new FormData(form),
        });

        const text = await response.text();

        overlay.classList.add("hidden");
        overlay.classList.remove("flex");

        modal.classList.remove("hidden");
        modal.classList.add("flex");

        if (!response.ok) {
          messageBox.innerHTML = `
        <div class="text-red-600 font-semibold">
          ❌ ${text}
        </div>
      `;
        } else {
          messageBox.innerHTML = `
        <div class="text-green-600 font-semibold">
          ✅ Message decrypted successfully
        </div>
        <div class="mt-3 text-gray-800 break-words">
          ${text}
        </div>
      `;
        }
      } catch (error) {
        overlay.classList.add("hidden");
        overlay.classList.remove("flex");

        modal.classList.remove("hidden");
        modal.classList.add("flex");

        messageBox.innerHTML = `
      <div class="text-red-600 font-semibold">
        ❌ Something went wrong.
      </div>
  `;
      }

      btn.disabled = false;
      btn.innerText = "Decode Message";
    });

    // Drag & Drop
    dropArea.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropArea.classList.add("bg-indigo-100");
    });

    dropArea.addEventListener("dragleave", () => {
      dropArea.classList.remove("bg-indigo-100");
    });

    dropArea.addEventListener("drop", (e) => {
      e.preventDefault();
      dropArea.classList.remove("bg-indigo-100");
      fileInput.files = e.dataTransfer.files;
      showFileName(fileInput);
    });
  });

  function closeResult() {
    const modal = document.getElementById("result-modal");
    modal.classList.add("hidden");
    modal.classList.remove("flex");
  }

  function showFileName(input) {
    const fileName = input.files.length > 0 ? input.files[0].name : "";
    document.getElementById("file-name").innerText = fileName
      ? "Selected: " + fileName
      : "";
  }
</script>
</div>
{% endblock %}
