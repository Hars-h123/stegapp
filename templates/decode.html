{% extends "base.html" %}
{% block content %}

<div class="max-w-3xl mx-auto w-full">

  <div class="glass-card p-6 sm:p-10">

    <div class="mb-6">
      <a href="/" class="text-sm font-medium opacity-70 hover:opacity-100 transition">← Back</a>
    </div>

    <h2 class="text-3xl font-bold mb-10 text-center">Decode Hidden Content</h2>

    <form id="decode-form" method="POST" action="/decode_action" enctype="multipart/form-data" class="space-y-8">

      <!-- Upload Stego Image -->
      <div>
        <label class="block font-semibold mb-3">Upload Stego Image</label>
        <div
          id="drop-area"
          class="border-2 border-dashed border-indigo-400 rounded-xl p-8 text-center cursor-pointer hover:bg-indigo-50 transition"
        >
          <input type="file" id="decodeImage" name="image" accept="image/png, image/jpeg" class="hidden" />
          <p class="text-gray-600">Drag &amp; Drop your image here</p>
          <p class="text-sm text-gray-400 mt-2">or click to browse files</p>
          <p id="file-name" class="mt-3 text-sm text-indigo-600 font-medium"></p>
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="block font-semibold mb-2">Enter Decryption Password</label>
        <div class="relative">
          <input
            type="password" name="password" id="decode-password" required
            class="w-full border rounded-lg p-3 pr-12 focus:ring-2 focus:ring-indigo-400 outline-none"
          />
          <button type="button" id="toggle-password-btn"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm">
            Show
          </button>
        </div>
      </div>

      <div class="text-center">
        <button type="submit" id="decode-btn"
          class="px-8 py-3 rounded-lg font-semibold bg-indigo-600 text-white hover:bg-indigo-700 transition">
          Decode
        </button>
      </div>

    </form>
  </div>
</div>

<!-- Loading Overlay -->
<div id="processing-overlay"
  class="fixed inset-0 hidden items-center justify-center z-50 bg-white/70 backdrop-blur-sm">
  <div class="bg-white rounded-2xl shadow-2xl px-10 py-8 text-center w-[320px]">
    <div class="text-indigo-600 text-lg font-semibold mb-3">Decoding image...</div>
    <p class="text-gray-500 text-sm mb-4">Please wait. Do not refresh the page.</p>
    <div class="w-6 h-6 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
  </div>
</div>

<!-- Result Modal -->
<div id="result-modal"
  class="fixed inset-0 hidden items-center justify-center z-50 bg-white/70 backdrop-blur-sm">
  <div class="bg-white rounded-2xl shadow-2xl px-10 py-8 text-center w-[440px] max-w-full">

    <h3 class="text-lg font-semibold text-indigo-600 mb-4">Decoded Content</h3>

    <!-- Text result -->
    <div id="text-result" class="hidden">
      <div class="bg-gray-100 rounded-lg p-4 text-gray-800 break-words mb-6 text-left" id="decoded-message"></div>
      <button onclick="copyDecodedText()"
        class="px-4 py-2 bg-indigo-100 text-indigo-700 rounded-lg text-sm mb-4 hover:bg-indigo-200 transition">
        📋 Copy Text
      </button>
    </div>

    <!-- File result -->
    <div id="file-result" class="hidden">
      <div class="bg-green-50 border border-green-200 rounded-xl p-5 mb-5 text-left">
        <p class="text-green-700 font-semibold text-sm mb-1">✅ File extracted successfully!</p>
        <p class="text-gray-700 text-sm">Filename: <span id="decoded-filename" class="font-mono font-semibold"></span></p>
      </div>
      <a id="file-download-btn"
        class="inline-block px-6 py-3 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700 transition mb-4">
        ⬇️ Download File
      </a>
    </div>

    <!-- Error result -->
    <div id="error-result" class="hidden">
      <div class="bg-red-50 border border-red-200 rounded-lg p-4 text-red-700 mb-4 text-sm" id="error-message"></div>
    </div>

    <button id="close-modal-btn"
      class="px-5 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 transition">
      Close
    </button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const form      = document.getElementById("decode-form");
  const overlay   = document.getElementById("processing-overlay");
  const modal     = document.getElementById("result-modal");
  const closeBtn  = document.getElementById("close-modal-btn");
  const passInput = document.getElementById("decode-password");
  const toggleBtn = document.getElementById("toggle-password-btn");
  const dropArea  = document.getElementById("drop-area");
  const fileInput = document.getElementById("decodeImage");
  const fileLabel = document.getElementById("file-name");

  /* Show/Hide password */
  toggleBtn.addEventListener("click", function () {
    if (passInput.type === "password") { passInput.type = "text";     toggleBtn.textContent = "Hide"; }
    else                               { passInput.type = "password"; toggleBtn.textContent = "Show"; }
  });

  /* Drag & Drop */
  dropArea.addEventListener("click", () => fileInput.click());
  dropArea.addEventListener("dragover",  (e) => { e.preventDefault(); dropArea.classList.add("bg-indigo-100"); });
  dropArea.addEventListener("dragleave", ()  => dropArea.classList.remove("bg-indigo-100"));
  dropArea.addEventListener("drop", (e) => {
    e.preventDefault();
    dropArea.classList.remove("bg-indigo-100");
    fileInput.files = e.dataTransfer.files;
    updateLabel();
  });
  fileInput.addEventListener("change", updateLabel);
  function updateLabel() {
    fileLabel.textContent = fileInput.files.length > 0 ? "Selected: " + fileInput.files[0].name : "";
  }

  /* Form submit */
  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    overlay.classList.remove("hidden");
    overlay.classList.add("flex");

    // Reset modal panels
    ["text-result","file-result","error-result"].forEach(id =>
      document.getElementById(id).classList.add("hidden")
    );

    try {
      const res  = await fetch(form.action, { method: "POST", body: new FormData(form) });
      const data = await res.json();

      overlay.classList.add("hidden");
      overlay.classList.remove("flex");
      modal.classList.remove("hidden");
      modal.classList.add("flex");

      if (!res.ok || data.error) {
        document.getElementById("error-result").classList.remove("hidden");
        document.getElementById("error-message").textContent = "❌ " + (data.error || "Unknown error");
        return;
      }

      if (data.type === "file") {
        document.getElementById("file-result").classList.remove("hidden");
        document.getElementById("decoded-filename").textContent = data.filename;
        document.getElementById("file-download-btn").href = "/download_decoded/" + data.dl_path;
        document.getElementById("file-download-btn").download = data.filename;

      } else {
        document.getElementById("text-result").classList.remove("hidden");
        document.getElementById("decoded-message").textContent = data.message;
      }

    } catch (err) {
      overlay.classList.add("hidden");
      overlay.classList.remove("flex");
      modal.classList.remove("hidden");
      modal.classList.add("flex");
      document.getElementById("error-result").classList.remove("hidden");
      document.getElementById("error-message").textContent = "❌ Something went wrong.";
    }
  });

  closeBtn.addEventListener("click", function () {
    modal.classList.add("hidden");
    modal.classList.remove("flex");
  });

});

function copyDecodedText() {
  const text = document.getElementById("decoded-message").textContent;
  navigator.clipboard.writeText(text).then(() => alert("Copied!")).catch(() => {});
}
</script>

{% endblock %}
