{% extends "base.html" %}

{% block content %}

<div class="max-w-3xl mx-auto mt-24">

<div class="glass-card p-12 text-center">

<h2 class="text-3xl font-bold mb-6">
📦 Your Image Is Ready
</h2>

<p class="text-gray-600 mb-10">
Your file has been prepared successfully.
Click the button below to download it.
</p>

<img
src="/download/{{filename}}"
class="mx-auto rounded-xl shadow-lg mb-10 w-96"
/>

<a
href="/download/{{filename}}"
class="px-8 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
Download Image
</a>

</div>

</div>

{% endblock %}
