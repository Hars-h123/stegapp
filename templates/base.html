<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StegApp</title>

    <!-- Tailwind CDN -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Helvetica Neue"', "Helvetica", "Arial", "sans-serif"],
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Global Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />

    <!-- Hover Step Styling (Used on index page) -->
    <style>
      .hover-step {
        padding: 20px;
        border-radius: 16px;
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .hover-step:hover {
        transform: translateX(10px) scale(1.05);
        background: #eef2ff;
      }
    </style>
  </head>

  <!-- Clean Light Background -->
  <body class="min-h-screen bg-gray-50 text-gray-900">
    <!-- ========================= -->
    <!-- Navbar -->
    <!-- ========================= -->
    <nav class="bg-white shadow-sm">
      <div
        class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center"
      >
        <!-- Logo -->
        <a
          href="/"
          class="text-xl font-bold text-indigo-600 hover:opacity-80 transition"
        >
          StegApp 🔐
        </a>
      </div>
    </nav>

    <!-- ========================= -->
    <!-- Page Content Wrapper -->
    <!-- ========================= -->
    <main class="max-w-5xl mx-auto px-6 py-12">
      {% block content %}{% endblock %}
    </main>

    <!-- ========================= -->
    <!-- Global Toast (Optional) -->
    <!-- ========================= -->
    <div
      id="toast"
      class="hidden fixed top-20 right-4 z-50 bg-indigo-600 text-white px-6 py-3 rounded-xl shadow-lg"
    ></div>
  </body>
</html>
